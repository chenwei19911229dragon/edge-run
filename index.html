<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Run 3.0</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(180deg,#141e30,#243b55);
}

canvas{display:block;}

#menu,#gameOver{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#00d2d3;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.ctrlBtn{
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,0.3);
font-size:30px;
}
</style>
</head>

<body>

<div id="menu">
<h1>EDGE RUN 3.0</h1>
<p>Best Score: <span id="bestScore">0</span></p>
<p>Total Coins: <span id="totalCoins">0</span></p>
<button onclick="startGame()">Start Game</button>
</div>

<div id="gameOver" style="display:none;">
<h1>Game Over</h1>
<p>Score: <span id="finalScore"></span></p>
<button onclick="restart()">Restart</button>
</div>

<div id="ui">
Score: <span id="score">0</span>
</div>

<div class="controls">
<button class="ctrlBtn" onclick="moveLeft()">◀</button>
<button class="ctrlBtn" onclick="moveRight()">▶</button>
</div>

<canvas id="game"></canvas>

<script>
// ===== SOUND SYSTEM =====
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq,duration){
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.frequency.value = freq;
osc.start();
gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
osc.stop(audioCtx.currentTime + duration);
}
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player={x:200,y:canvas.height-150,size:30,color:"cyan"};

let obstacles=[];
let coins=[];
let speed=4;
let score=0;

let best=localStorage.getItem("bestScore")||0;
let totalCoins=localStorage.getItem("coins")||0;

document.getElementById("bestScore").innerText=best;
document.getElementById("totalCoins").innerText=totalCoins;

let gameRunning=false;

function startGame(){
document.getElementById("menu").style.display="none";
gameRunning=true;
loop();
}
setInterval(()=>{
playBeep(300,0.05);
},800);
function restart(){location.reload();}

function moveLeft(){player.x-=40;}
function moveRight(){player.x+=40;}

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft")moveLeft();
if(e.key==="ArrowRight")moveRight();
});

function spawnObstacle(){
let size=40;
let x=Math.random()*(canvas.width-size);
obstacles.push({x:x,y:-50,size:size});
}

function spawnCoin(){
let size=20;
let x=Math.random()*(canvas.width-size);
coins.push({x:x,y:-50,size:size});
}

function drawPlayer(){
ctx.fillStyle=player.color;
ctx.fillRect(player.x,player.y,player.size,player.size);
}

function drawObstacles(){
ctx.fillStyle="white";
for(let i=0;i<obstacles.length;i++){
let o=obstacles[i];
o.y+=speed;
ctx.fillRect(o.x,o.y,o.size,o.size);

if(o.x<player.x+player.size &&
o.x+o.size>player.x &&
o.y<player.y+player.size &&
o.y+o.size>player.y){
gameOver();
}

if(o.y>canvas.height){
obstacles.splice(i,1);
score++;
document.getElementById("score").innerText=score;
if(score%15===0)speed+=0.5;
}
}
}

function drawCoins(){
ctx.fillStyle="gold";
for(let i=0;i<coins.length;i++){
let c=coins[i];
c.y+=speed;
ctx.fillRect(c.x,c.y,c.size,c.size);

if(c.x<player.x+player.size &&
c.x+c.size>player.x &&
c.y<player.y+player.size &&
c.y+c.size>player.y){
coins.splice(i,1);
totalCoins++;
playBeep(600,0.1);
localStorage.setItem("coins",totalCoins);
document.getElementById("totalCoins").innerText=totalCoins;
}
}
}
playBeep(150,0.5);
function gameOver(){
gameRunning=false;
document.getElementById("finalScore").innerText=score;
document.getElementById("gameOver").style.display="flex";
if(score>best){
localStorage.setItem("bestScore",score);
}
}

function loop(){
if(!gameRunning)return;
ctx.clearRect(0,0,canvas.width,canvas.height);
drawPlayer();
drawObstacles();
drawCoins();
requestAnimationFrame(loop);
}

setInterval(()=>{if(gameRunning)spawnObstacle();},1200);
setInterval(()=>{if(gameRunning)spawnCoin();},2000);
</script>
</body>
</html>
