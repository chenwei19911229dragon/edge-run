<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Run 2.0</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(180deg,#1e3c72,#2a5298);
}

canvas{
display:block;
}

#menu,#gameOver{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#00d2d3;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
}

.ctrlBtn{
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,0.3);
font-size:30px;
}
</style>
</head>

<body>

<div id="menu">
<h1>EDGE RUN 2.0</h1>
<p>Best Score: <span id="bestScore">0</span></p>
<button onclick="startGame()">Start Game</button>
<button onclick="changeSkin()">Change Skin</button>
</div>

<div id="gameOver" style="display:none;">
<h1>Game Over</h1>
<p>Score: <span id="finalScore"></span></p>
<button onclick="revive()">Revive</button>
<button onclick="restart()">Restart</button>
</div>

<div id="ui">
Score: <span id="score">0</span>
</div>

<div class="controls">
<button class="ctrlBtn" onclick="moveLeft()">◀</button>
<button class="ctrlBtn" onclick="moveRight()">▶</button>
</div>

<canvas id="game"></canvas>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player={
x:200,
y:canvas.height-150,
size:30,
color:"cyan"
};

let skins=["cyan","red","yellow","lime","white"];
let skinIndex=0;

let obstacles=[];
let speed=4;
let score=0;
let best=localStorage.getItem("bestScore")||0;
document.getElementById("bestScore").innerText=best;

let gameRunning=false;
let revived=false;

function startGame(){
document.getElementById("menu").style.display="none";
gameRunning=true;
loop();
}

function restart(){
location.reload();
}

function revive(){
if(!revived){
revived=true;
document.getElementById("gameOver").style.display="none";
player.x=200;
gameRunning=true;
loop();
}
}

function changeSkin(){
skinIndex++;
if(skinIndex>=skins.length)skinIndex=0;
player.color=skins[skinIndex];
}

function moveLeft(){
player.x-=40;
}

function moveRight(){
player.x+=40;
}

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft")moveLeft();
if(e.key==="ArrowRight")moveRight();
});

function spawnObstacle(){
let size=40;
let x=Math.random()*(canvas.width-size);
obstacles.push({x:x,y:-50,size:size});
}

function drawPlayer(){
ctx.fillStyle=player.color;
ctx.fillRect(player.x,player.y,player.size,player.size);
}

function drawObstacles(){
ctx.fillStyle="white";
for(let i=0;i<obstacles.length;i++){
let o=obstacles[i];
o.y+=speed;
ctx.fillRect(o.x,o.y,o.size,o.size);

if(
o.x<player.x+player.size &&
o.x+o.size>player.x &&
o.y<player.y+player.size &&
o.y+o.size>player.y
){
gameOver();
}

if(o.y>canvas.height){
obstacles.splice(i,1);
score++;
document.getElementById("score").innerText=score;
if(score%10===0)speed+=0.5;
}
}
}

function gameOver(){
gameRunning=false;
document.getElementById("finalScore").innerText=score;
document.getElementById("gameOver").style.display="flex";
if(score>best){
localStorage.setItem("bestScore",score);
}
}

function loop(){
if(!gameRunning)return;
ctx.clearRect(0,0,canvas.width,canvas.height);
drawPlayer();
drawObstacles();
requestAnimationFrame(loop);
}

setInterval(()=>{
if(gameRunning)spawnObstacle();
},1200);

</script>
</body>
</html>
