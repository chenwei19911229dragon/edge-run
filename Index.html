<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Run</title>
<style>
body{margin:0;overflow:hidden;background:#111;font-family:Arial;}
canvas{display:block;}
#ui{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}
button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:8px;
background:#00ffff;
color:black;
margin-top:20px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");
let ui=document.getElementById("ui");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let leftX,rightX;

let player={
  x:0,y:0,r:15,
  speed:14,
  moving:false,
  direction:1
};

let obstacleY=-100;
let gapX=0;
let gapWidth=120;
let speed=3;

let score=0;
let best=localStorage.getItem("bestScore")||0;

let state="menu";

function initGame(){
  leftX=60;
  rightX=canvas.width-60;
  player.x=leftX;
  player.y=canvas.height-120;
  player.moving=false;
  obstacleY=-100;
  speed=3;
  score=0;
  newGap();
  state="playing";
  ui.innerHTML="";
}

function newGap(){
  gapX=Math.random()*(canvas.width-gapWidth);
}

function update(){
  if(state!=="playing") return;

  speed+=0.001;
  obstacleY+=speed;

  if(obstacleY>canvas.height){
    obstacleY=-20;
    newGap();
    score++;
  }

  if(player.moving){
    player.x+=player.direction*player.speed;

    if(player.direction>0 && player.x>=rightX){
      player.x=rightX;
      player.moving=false;
    }
    if(player.direction<0 && player.x<=leftX){
      player.x=leftX;
      player.moving=false;
    }
  }

  if(obstacleY+20>player.y-player.r &&
     obstacleY<player.y+player.r){

    if(player.x < gapX || player.x > gapX+gapWidth){
      state="dead";
      if(score>best){
        best=score;
        localStorage.setItem("bestScore",best);
      }
      showGameOver();
    }
  }
}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,"#1e3c72");
  g.addColorStop(1,"#2a5298");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#ff4d4d";
  ctx.fillRect(0,obstacleY,gapX,20);
  ctx.fillRect(gapX+gapWidth,obstacleY,
               canvas.width-(gapX+gapWidth),20);

  ctx.beginPath();
  ctx.fillStyle="#00ffff";
  ctx.arc(player.x,player.y,15,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score: "+score,20,40);
  ctx.fillText("Best: "+best,20,70);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function showMenu(){
  ui.innerHTML=`
    <h1>EDGE RUN</h1>
    <p>Best Score: ${best}</p>
    <button onclick="initGame()">Start Game</button>
  `;
}

function showGameOver(){
  ui.innerHTML=`
    <h1>Game Over</h1>
    <p>Score: ${score}</p>
    <p>Best: ${best}</p>
    <button onclick="initGame()">Play Again</button>
  `;
}

canvas.addEventListener("click",()=>{
  if(state!=="playing") return;
  if(player.moving) return;

  if(player.x===leftX){
    player.direction=1;
  }else{
    player.direction=-1;
  }
  player.moving=true;
});

showMenu();
loop();

</script>
</body>
</html>
